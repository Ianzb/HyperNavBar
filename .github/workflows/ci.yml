name: CI Build

env:
  PROGRAM_NAME: "HyperNavBar"

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - "app/**"
  pull_request:
    branches: [ main ]
    paths:
      - "app/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: 读取版本号
        id: get_version
        run: |
          $content = Get-Content app/build.gradle.kts -Raw
          $versionName = [regex]::Match($content, 'versionName = "([^"]+)"').Groups[1].Value
          $versionCode = [regex]::Match($content, 'versionCode = (\d+)').Groups[1].Value
          Write-Output "version_name=$versionName" >> $env:GITHUB_OUTPUT
          Write-Output "version_code=$versionCode" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: 生成 CI 版本号
        id: generate_ci_version
        run: |
          $base = "${{ steps.get_version.outputs.version_name }}"
          $ciVersion = "$base+ci$env:GITHUB_RUN_NUMBER"
          Write-Output "ci_version=$ciVersion" >> $env:GITHUB_OUTPUT
          Write-Host "CI Version: $ciVersion"
        shell: pwsh

      - name: 构建 Debug APK
        run: ./gradlew assembleDebug

      - name: 重命名 APK
        run: |
          $ciVersion = "${{ steps.generate_ci_version.outputs.ci_version }}"
          Rename-Item -Path "app/build/outputs/apk/debug/app-arm64-v8a-debug.apk" -NewName "${{ env.PROGRAM_NAME }}_$ciVersion.apk"
        shell: pwsh

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PROGRAM_NAME }}_${{ steps.generate_ci_version.outputs.ci_version }}
          path: ${{ env.PROGRAM_NAME }}_${{ steps.generate_ci_version.outputs.ci_version }}.apk
          retention-days: 7

      - name: 显示构建信息
        run: |
          Write-Host "构建完成"
          Write-Host "版本号: ${{ steps.generate_ci_version.outputs.ci_version }}"
          Write-Host "构建产物已上传至 Actions Artifacts"
        shell: pwsh
