name: Release Build

env:
  PROGRAM_NAME: "HyperNavBar"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: true

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: 读取当前版本号
        id: get_version
        run: |
          VERSION_NAME=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | sed 's/.*= //')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT

      - name: 更新版本号（如果提供）
        id: update_version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          CURRENT_VERSION_NAME="${{ steps.get_version.outputs.version_name }}"
          CURRENT_VERSION_CODE="${{ steps.get_version.outputs.version_code }}"
          
          if [ -z "$INPUT_VERSION" ]; then
            echo "未指定版本号，使用当前版本号"
            echo "final_version=$CURRENT_VERSION_NAME" >> $GITHUB_OUTPUT
            echo "version_code=$CURRENT_VERSION_CODE" >> $GITHUB_OUTPUT
            echo "version_changed=false" >> $GITHUB_OUTPUT
          else
            echo "使用指定版本号: $INPUT_VERSION"
            NEW_VERSION_CODE=$((CURRENT_VERSION_CODE + 1))
            
            # 更新 build.gradle.kts 中的版本号
            sed -i "s/versionCode = $CURRENT_VERSION_CODE/versionCode = $NEW_VERSION_CODE/" app/build.gradle.kts
            sed -i "s/versionName = \"$CURRENT_VERSION_NAME\"/versionName = \"$INPUT_VERSION\"/" app/build.gradle.kts
            
            echo "final_version=$INPUT_VERSION" >> $GITHUB_OUTPUT
            echo "version_code=$NEW_VERSION_CODE" >> $GITHUB_OUTPUT
            echo "version_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 构建 Release APK (arm64-v8a)
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: 重命名 APK
        run: |
          FINAL_VERSION="${{ steps.update_version.outputs.final_version }}"
          mv app/build/outputs/apk/release/app-arm64-v8a-release.apk \
             ${PROGRAM_NAME}_${FINAL_VERSION}.apk

      - name: 提交版本更新
        if: steps.update_version.outputs.version_changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -u
          if ! git diff --cached --quiet; then
            git stash
            git pull --rebase origin main
            git stash pop
            git add -u
            git commit -m "Update version to ${{ steps.update_version.outputs.final_version }} (code ${{ steps.update_version.outputs.version_code }}) [ci skip]"
            git push origin main
          else
            echo "无版本变更"
          fi

      - name: 发布 GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ steps.update_version.outputs.final_version }}
          tag_name: ${{ steps.update_version.outputs.final_version }}
          files: ${{ env.PROGRAM_NAME }}_${{ steps.update_version.outputs.final_version }}.apk
          body: |
            ## ${{ env.PROGRAM_NAME }} ${{ steps.update_version.outputs.final_version }}
            
            ### 下载
            - **APK**: `${{ env.PROGRAM_NAME }}_${{ steps.update_version.outputs.final_version }}.apk`
            - **架构**: arm64-v8a
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.PROGRAM_NAME }}_${{ steps.update_version.outputs.final_version }}
          path: ${{ env.PROGRAM_NAME }}_${{ steps.update_version.outputs.final_version }}.apk
          retention-days: 30

      - name: 显示构建信息
        run: echo "Release ${{ steps.update_version.outputs.final_version }} 已发布"
